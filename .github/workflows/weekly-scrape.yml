name: Weekly Spotify Scraper

on:
  # Lunes a las 10am Argentina (UTC-3 = 13:00 UTC)
  schedule:
    - cron: '0 13 * * 1'
  # También se puede ejecutar manualmente desde GitHub Actions
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scraper/package.json

      - name: Install dependencies
        working-directory: scraper
        run: npm install

      - name: Install Playwright browsers
        working-directory: scraper
        run: npx playwright install chromium --with-deps

      - name: Run scraper
        working-directory: scraper
        env:
          SPOTIFY_EMAIL: ${{ secrets.SPOTIFY_EMAIL }}
          SPOTIFY_PASSWORD: ${{ secrets.SPOTIFY_PASSWORD }}
          GOOGLE_SERVICE_ACCOUNT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT }}
        run: node spotify-artists.js

      - name: Upload screenshots (siempre, para debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-screenshots
          path: scraper/screenshots/
          retention-days: 7
